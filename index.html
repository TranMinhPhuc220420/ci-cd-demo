<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager — CI/CD Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1>📋 Task Manager</h1>
      <p class="app__subtitle">PLT Solutions | Demo project for CI/CD with GitHub Actions</p>
    </header>

    <form id="task-form" class="task-form">
      <input
        type="text"
        id="task-input"
        placeholder="Enter a new task..."
        required
        autocomplete="off"
      />
      <button type="submit">Add</button>
    </form>

    <section class="stats" id="stats">
      <span>Total: <strong id="stat-total">0</strong></span>
      <span>Done: <strong id="stat-done">0</strong></span>
      <span>Pending: <strong id="stat-pending">0</strong></span>
    </section>

    <ul id="task-list" class="task-list"></ul>

    <footer class="app__footer">
      <span id="build-version">version: dev</span>
    </footer>
  </main>

  <script src="utils.js"></script>
  <script src="script.js"></script>
</body>
</html>
