name: CI/CD Pipeline

# Kích hoạt pipeline khi:
# - push lên nhánh main
on:
  push:
    branches: ["main"]

# Chỉ cần quyền đọc source code
permissions:
  contents: read

# Nếu có nhiều lần push liên tiếp, huỷ lần chạy cũ để tiết kiệm tài nguyên
concurrency:
  group: "ci-cd-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: CI — chạy với push lên nhánh main
  # checkout -> setup node -> install -> lint -> test -> build -> upload artifact
  # Nếu bất kỳ bước nào fail, các bước sau dừng lại và job deploy sẽ không chạy.
  # ---------------------------------------------------------------------------
  ci:
    name: Lint - Test - Build
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: 3. Install dependencies
        run: npm ci

      - name: 4. Lint
        run: npm run lint

      - name: 5. Test
        run: npm test

      - name: 6. Build
        run: npm run build
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: 7. Upload build artifact (dist/)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # JOB 2: Deploy — CHỈ chạy khi CI pass VÀ là push vào nhánh main
  # (Pull Request sẽ không deploy, tránh publish code chưa được merge)
  # Deploy thư mục dist/ lên cPanel qua FTP.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to cPanel via FTP
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 1. Download build artifact (dist/)
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: 2. Kiểm tra FTP secrets
        run: |
          missing=0
          for key in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_SERVER_DIR; do
            if [ -z "${!key}" ]; then
              echo "::error::Secret chưa được cấu hình: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "Vào Settings → Secrets and variables → Actions để thêm các secret trên."
            exit 1
          fi
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}

      - name: 3. Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          port: 21
